name: Tests

# Run the unit test suite on every pull request, and on pushes to main.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # `npm ci` runs `postinstall` -> `prisma generate`, which parses the
      # schema. The tests mock Prisma, so no real database is contacted —
      # these are placeholders just so the env() references resolve.
      DATABASE_URL: postgresql://user:pass@localhost:5432/db
      DIRECT_URL: postgresql://user:pass@localhost:5432/db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
